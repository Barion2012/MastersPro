env BUILD_ENV;
env APP_DOMAIN;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    resolver 127.0.0.11 valid=30s; # Docker DNS для динамического разрешения имен
    
    # Определение upstream серверов
    upstream frontend {
        server nuxt:3000;
    }
    upstream backend {
        server laravel:9000;
    }
    upstream reverb {
        server laravel:8080;
    }

    # Перенаправление HTTP на HTTPS
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Основной серверный блок HTTPS
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        
        server_name $APP_DOMAIN;

        # Настройки SSL/TLS
        ssl_certificate /etc/ssl/fullchain.pem;
        ssl_certificate_key /etc/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
        ssl_prefer_server_ciphers on;

        # Увеличение размера буфера для тела запроса
        client_body_buffer_size 1m;

        # Заголовки безопасности
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Логи
        error_log /var/log/nginx/error.log;
        access_log /var/log/nginx/access.log;

        client_max_body_size 100M;
        root /var/www/html/public;

        # Защита чувствительных путей
        location ~ /\.git/ { deny all; }
        location ~ /\.env { deny all; }

        # Глобальная блокировка опасных паттернов во всех частях запроса
        set $block_attack 0;
        if ($request_uri ~* "(data:|data%3A|data://text/plain\;base64|php://|php%3A//|expect://|expect%3A//|input=|system\()" ) {
            set $block_attack 1;
        }
        if ($query_string ~* "(data:|data%3A|data://text/plain\;base64|php://|php%3A//|expect://|expect%3A//|input=|system\()" ) {
            set $block_attack 1;
        }
        if ($http_cookie ~* "(data:|data%3A|data://text/plain\;base64|php://|php%3A//|expect://|expect%3A//|input=|system\()" ) {
            set $block_attack 1;
        }
        if ($http_user_agent ~* "(data:|data%3A|data://text/plain\;base64|php://|php%3A//|expect://|expect%3A//|input=|system\()" ) {
            set $block_attack 1;
        }
        if ($block_attack) {
            return 403;
        }

        access_by_lua_block {
            if ngx.var.args and ngx.var.args:match("[A-Za-z0-9+/=]{20,}") then
                return ngx.exit(403)
            end
            if ngx.var.args and ngx.var.args:lower():find("data://") then
                return ngx.exit(403)
            end
            if ngx.var.args and ngx.var.args:lower():find("base64") then
                return ngx.exit(403)
            end
            if ngx.var.args and ngx.var.args:find("XDEBUG_SESSION_START") then
                return ngx.exit(403)
            end
            if ngx.req.get_method() == "POST" then
                ngx.req.read_body()
                local body = ngx.req.get_body_data()
                if body and body:match("data://text/plain;base64,") then
                    return ngx.exit(403)
                end
            end
        }

        # Блокировка подозрительных PHP-файлов
        location ~* \.(phpinfo|debug|profiler|dev|test|backup|restore|admin|config)\.php$ {
            deny all;
            return 403;
        }

        # Блокировка подозрительных путей
        location ~* /(_profiler|debug|phpinfo|xdebug) {
            deny all;
            return 403;
        }

        location ~* /(HNAP1|restore|backup) {
            deny all;
            return 403;
        }

        location ~* \?XDEBUG_SESSION_START {
            deny all;
            return 403;
        }

        # Запрет выполнения PHP в папках для загрузки файлов
        location ~* ^/(uploads|files|images|static)/.*\.php$ {
            deny all;
        }

        # Проверка аргументов запроса
        location / {
            if ($args ~ "[A-Za-z0-9+/=]{20,}") { return 403; }
            if ($args ~* "(data://|base64)") { return 403; }
            if ($args ~* "XDEBUG_SESSION_START") { return 403; }
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://frontend;
        }

        location /_nuxt/ {
            if ($args ~ "[A-Za-z0-9+/=]{20,}") { return 403; }
            if ($args ~* "(data://|base64)") { return 403; }
            if ($args ~* "XDEBUG_SESSION_START") { return 403; }

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_set_header Referer $http_referer;

            proxy_pass http://frontend;
        }

        location /docs {
            set $proxy_target "http://frontend";
            access_by_lua_block {
                local build_env = os.getenv("BUILD_ENV")
                if build_env == "prod" then
                    ngx.status = 404
                    ngx.say("Not Found")
                    return ngx.exit(404)
                elseif build_env == "dev" then
                    ngx.var.proxy_target = "http://vitepress:5174"
                end
            }

            proxy_pass $proxy_target;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_set_header Referer $http_referer;
        }

        location /api {
            try_files $uri $uri/ /index.php?$query_string;
            gzip_static on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_set_header Referer $http_referer;
        }

        location /app/ {
            proxy_pass http://reverb;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /broadcasting/ {
            try_files $uri $uri/ /index.php?$query_string;
            gzip_static on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_set_header Referer $http_referer;
        }

        location /livewire/ {
            try_files $uri $uri/ /index.php?$query_string;
            gzip_static on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_set_header Referer $http_referer;
        }

        location /pulse {
            try_files $uri $uri/ /index.php?$query_string;
            gzip_static on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_set_header Referer $http_referer;
        }

        location /storage {
            alias /var/www/html/storage/app/public;
            add_header Cache-Control "public, max-age=31536000, immutable";
            location ~ \.php$ { deny all; }
        }

        location /build/ {
            alias /usr/share/nginx/html/build/;
            location ~ \.php$ { deny all; }
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_pass backend;
            fastcgi_index index.php;
        }
    }
}